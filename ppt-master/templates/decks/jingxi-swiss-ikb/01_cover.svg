<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#002FA7"/>
  <rect x="0" y="0" width="1280" height="1" fill="#FFFFFF" opacity="0.22"/>
  <g id="brand-chrome">
    <image href="images/logo.png" x="64" y="40" width="44" height="44" preserveAspectRatio="xMidYMid meet"/>
    <text x="120" y="62" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">{{COMPANY_NAME}}</text>
    <text x="120" y="80" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.78">{{COMPANY_TAGLINE}}</text>
    <text x="120" y="96" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.55">{{COMPANY_LEGAL}}</text>
  </g>
  <text x="1100" y="68" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" opacity="0.65" text-anchor="end">{{DOC_CODE}} · {{PAGE_NUM}}</text>
  <text x="64" y="200" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#FFFFFF" opacity="0.78" letter-spacing="3">{{KICKER}}</text>
  <text x="64" y="320" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="56" font-weight="200" fill="#FFFFFF">{{TITLE}}</text>
  <text x="64" y="380" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="40" font-weight="300" fill="#FFFFFF">{{SUBTITLE}}</text>
  <line x1="64" y1="440" x2="1216" y2="440" stroke="#FFFFFF" stroke-width="1" opacity="0.22"/>
  <text x="64" y="500" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" font-weight="300" fill="#FFFFFF" opacity="0.86">{{LEAD}}</text>
  <text x="64" y="660" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#FFFFFF" opacity="0.6">{{FOOTER_LEFT}}</text>
</svg>
