  <line x1="552" y1="468" x2="1216" y2="468" stroke="#3D3D3D" stroke-width="1"/>
  <text x="552" y="458" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#002FA7">{{MOD7_NUM}}</text>
