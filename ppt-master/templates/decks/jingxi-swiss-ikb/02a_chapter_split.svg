<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="640" height="720" fill="#0A0A0A"/>
  <rect x="640" y="0" width="640" height="720" fill="#F0F0EE"/>
  <g id="brand-chrome-left">
    <image href="images/logo.png" x="48" y="36" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
    <text x="100" y="56" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="600" fill="#FAFAF8">{{COMPANY_NAME}}</text>
  </g>
  <image href="images/logo-mono-accent.png" x="688" y="40" width="32" height="32" preserveAspectRatio="xMidYMid meet"/>
  <text x="728" y="58" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#002FA7">{{COMPANY_TAGLINE}}</text>
  <text x="48" y="110" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.55">{{SECTION_LABEL}}</text>
  <text x="592" y="110" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.55" text-anchor="end">{{PAGE_NUM}}</text>
  <text x="48" y="280" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.72">{{META_LABEL}}</text>
  <text x="48" y="340" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="42" font-weight="200" fill="#FFFFFF">{{TITLE_LINE1}}</text>
  <text x="48" y="392" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="42" font-weight="200" fill="#FFFFFF">{{TITLE_LINE2}}</text>
  <text x="48" y="660" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.55">{{FOOTER_HINT}}</text>
  <rect x="688" y="200" width="4" height="168" fill="#002FA7"/>
  <text x="720" y="228" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" font-weight="500" fill="#0A0A0A">{{CALLOUT_L1}}</text>
  <text x="720" y="260" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" font-weight="500" fill="#0A0A0A">{{CALLOUT_L2}}</text>
  <text x="720" y="292" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" font-weight="500" fill="#0A0A0A">{{CALLOUT_L3}}</text>
  <text x="720" y="332" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#737373">{{CALLOUT_SRC}}</text>
  <text x="720" y="400" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#525252">{{BODY_L1}}</text>
  <text x="720" y="432" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#525252">{{BODY_L2}}</text>
  <text x="720" y="464" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#525252">{{BODY_L3}}</text>
  <text x="720" y="496" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#525252">{{BODY_L4}}</text>
</svg>
