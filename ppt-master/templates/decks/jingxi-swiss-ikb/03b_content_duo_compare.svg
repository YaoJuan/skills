<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0A0A0A"/>
  <g id="brand-chrome">
    <image href="images/logo.png" x="64" y="32" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
    <text x="116" y="54" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="600" fill="#FAFAF8">{{COMPANY_NAME}}</text>
    <text x="116" y="72" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#94A3B8">{{COMPANY_TAGLINE}}</text>
  </g>
  <text x="1216" y="100" font-family="Arial, sans-serif" font-size="13" fill="#737373" text-anchor="end">{{PAGE_NUM}}</text>
  <text x="64" y="144" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#737373">{{SECTION_LABEL}}</text>
  <!-- evolution headline: muted → accent arrow -->
  <text x="64" y="200" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="38" font-weight="200" fill="#FAFAF8" opacity="0.55">{{TITLE_FROM}}</text>
  <line x1="318" y1="192" x2="378" y2="192" stroke="#002FA7" stroke-width="2"/>
  <polygon points="378,187 392,192 378,197" fill="#002FA7"/>
  <text x="408" y="200" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="38" font-weight="300" fill="#5B7BFF">{{TITLE_TO}}</text>
  <line x1="640" y1="248" x2="640" y2="660" stroke="#FFFFFF" stroke-width="1" opacity="0.18"/>
  <!-- column A -->
  <text x="64" y="262" font-family="Arial, sans-serif" font-size="10" fill="#525252" letter-spacing="2">{{COL_A_PHASE}}</text>
  <rect x="64" y="272" width="28" height="28" rx="2" fill="none" stroke="#737373" stroke-width="1"/>
  <text x="78" y="292" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#FAFAF8" text-anchor="middle">{{COL_A_BADGE}}</text>
  <text x="104" y="292" font-family="Arial, sans-serif" font-size="11" fill="#737373" letter-spacing="1">{{COL_A_TAG}}</text>
  <text x="64" y="332" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="26" font-weight="300" fill="#FAFAF8">{{COL_A_TITLE_L1}}</text>
  <text x="64" y="366" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="26" font-weight="300" fill="#FAFAF8">{{COL_A_TITLE_L2}}</text>
  <text x="64" y="412" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#737373">{{COL_A_DESC_L1}}</text>
  <text x="64" y="440" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#737373">{{COL_A_DESC_L2}}</text>
  <line x1="64" y1="468" x2="576" y2="468" stroke="#FFFFFF" stroke-width="1" opacity="0.12"/>
  <text x="64" y="496" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#737373">{{COL_A_BULLET1}}</text>
  <text x="64" y="524" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#737373">{{COL_A_BULLET2}}</text>
  <text x="64" y="552" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#737373">{{COL_A_BULLET3}}</text>
  <!-- column B -->
  <text x="688" y="262" font-family="Arial, sans-serif" font-size="10" fill="#5B7BFF" letter-spacing="2">{{COL_B_PHASE}}</text>
  <rect x="688" y="272" width="28" height="28" rx="2" fill="none" stroke="#5B7BFF" stroke-width="1"/>
  <text x="702" y="292" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#5B7BFF" text-anchor="middle">{{COL_B_BADGE}}</text>
  <text x="728" y="292" font-family="Arial, sans-serif" font-size="11" fill="#5B7BFF" letter-spacing="1">{{COL_B_TAG}}</text>
  <text x="688" y="332" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="26" font-weight="300" fill="#FAFAF8">{{COL_B_TITLE_L1}}</text>
  <text x="688" y="366" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="26" font-weight="300" fill="#5B7BFF">{{COL_B_TITLE_L2}}</text>
  <text x="688" y="412" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#E0E0E0">{{COL_B_DESC_L1}}</text>
  <text x="688" y="440" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#E0E0E0">{{COL_B_DESC_L2}}</text>
  <line x1="688" y1="468" x2="1200" y2="468" stroke="#5B7BFF" stroke-width="1" opacity="0.35"/>
  <text x="688" y="496" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#E0E0E0">{{COL_B_BULLET1}}</text>
  <text x="688" y="520" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#E0E0E0">{{COL_B_BULLET2}}</text>
  <text x="688" y="548" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#E0E0E0">{{COL_B_BULLET3}}</text>
</svg>
