<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FAFAF8"/>
  <g id="brand-chrome">
    <image href="images/logo.png" x="64" y="34" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>
    <text x="108" y="54" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="600" fill="#0A0A0A">{{COMPANY_NAME}}</text>
    <text x="108" y="72" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#737373">{{COMPANY_TAGLINE}}</text>
  </g>
  <text x="1216" y="100" font-family="Arial, sans-serif" font-size="13" fill="#737373" text-anchor="end">{{PAGE_NUM}}</text>
  <text x="64" y="144" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#525252">{{SECTION_LABEL}}</text>
  <rect x="64" y="168" width="80" height="3" fill="#002FA7"/>
  <text x="64" y="208" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="200" fill="#0A0A0A">{{PAGE_TITLE}}</text>
  <!-- card 1 -->
  <line x1="64" y1="260" x2="280" y2="260" stroke="#E0E0E0" stroke-width="1"/>
  <text x="64" y="292" font-family="Arial, sans-serif" font-size="11" fill="#737373">{{CARD1_META}}</text>
  <text x="64" y="328" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="300" fill="#0A0A0A">{{CARD1_TITLE}}</text>
  <text x="64" y="360" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{CARD1_BODY_L1}}</text>
  <text x="64" y="388" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{CARD1_BODY_L2}}</text>
  <!-- card 2 -->
  <line x1="336" y1="260" x2="552" y2="260" stroke="#E0E0E0" stroke-width="1"/>
  <text x="336" y="292" font-family="Arial, sans-serif" font-size="11" fill="#737373">{{CARD2_META}}</text>
  <text x="336" y="328" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="300" fill="#0A0A0A">{{CARD2_TITLE}}</text>
  <text x="336" y="360" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{CARD2_BODY_L1}}</text>
  <text x="336" y="388" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{CARD2_BODY_L2}}</text>
  <!-- card 3 -->
  <line x1="608" y1="260" x2="824" y2="260" stroke="#E0E0E0" stroke-width="1"/>
  <text x="608" y="292" font-family="Arial, sans-serif" font-size="11" fill="#737373">{{CARD3_META}}</text>
  <text x="608" y="328" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="300" fill="#0A0A0A">{{CARD3_TITLE}}</text>
  <text x="608" y="360" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{CARD3_BODY_L1}}</text>
  <text x="608" y="388" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{CARD3_BODY_L2}}</text>
  <!-- card 4 -->
  <line x1="880" y1="260" x2="1096" y2="260" stroke="#E0E0E0" stroke-width="1"/>
  <text x="880" y="292" font-family="Arial, sans-serif" font-size="11" fill="#737373">{{CARD4_META}}</text>
  <text x="880" y="328" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="300" fill="#0A0A0A">{{CARD4_TITLE}}</text>
  <text x="880" y="360" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{CARD4_BODY_L1}}</text>
  <text x="880" y="388" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{CARD4_BODY_L2}}</text>
</svg>
