<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FAFAF8"/>
  <g id="brand-chrome">
    <image href="images/logo.png" x="64" y="34" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>
    <text x="108" y="54" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="600" fill="#0A0A0A">{{COMPANY_NAME}}</text>
    <text x="108" y="72" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#737373">{{COMPANY_TAGLINE}}</text>
  </g>
  <text x="1216" y="100" font-family="Arial, sans-serif" font-size="13" fill="#737373" text-anchor="end">{{PAGE_NUM}}</text>
  <text x="64" y="144" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#525252">{{SECTION_LABEL}}</text>
  <text x="64" y="188" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="200" fill="#0A0A0A">{{TITLE_LINE1}}</text>
  <text x="64" y="232" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="200" fill="#0A0A0A">{{TITLE_LINE2}}</text>
  <!-- column 1 (cx=232) -->
  <line x1="64" y1="280" x2="400" y2="280" stroke="#E0E0E0" stroke-width="1"/>
  <text x="232" y="316" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#002FA7" letter-spacing="1" text-anchor="middle">{{COL1_LABEL}}</text>
  <text x="232" y="352" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#525252" text-anchor="middle">{{COL1_BODY_L1}}</text>
  <text x="232" y="380" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#525252" text-anchor="middle">{{COL1_BODY_L2}}</text>
  <text x="232" y="520" font-family="Arial, sans-serif" font-size="64" font-weight="200" fill="#0A0A0A" text-anchor="middle">{{COL1_KPI}}</text>
  <!-- column 2 (cx=616) -->
  <line x1="448" y1="280" x2="784" y2="280" stroke="#E0E0E0" stroke-width="1"/>
  <text x="616" y="316" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#525252" letter-spacing="1" text-anchor="middle">{{COL2_LABEL}}</text>
  <text x="616" y="352" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#525252" text-anchor="middle">{{COL2_BODY_L1}}</text>
  <text x="616" y="380" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#525252" text-anchor="middle">{{COL2_BODY_L2}}</text>
  <text x="616" y="520" font-family="Arial, sans-serif" font-size="64" font-weight="200" fill="#0A0A0A" text-anchor="middle">{{COL2_KPI}}</text>
  <!-- column 3 (cx=1000, accent top rule) -->
  <line x1="832" y1="280" x2="1168" y2="280" stroke="#002FA7" stroke-width="2"/>
  <text x="1000" y="316" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#002FA7" letter-spacing="1" text-anchor="middle">{{COL3_LABEL}}</text>
  <text x="1000" y="352" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#525252" text-anchor="middle">{{COL3_BODY_L1}}</text>
  <text x="1000" y="380" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#525252" text-anchor="middle">{{COL3_BODY_L2}}</text>
  <text x="1000" y="512" font-family="Arial, sans-serif" font-size="64" font-weight="200" fill="#002FA7" text-anchor="middle">{{COL3_KPI}}</text>
  <text x="1000" y="548" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252" text-anchor="middle">{{COL3_KPI_SUB}}</text>
</svg>
