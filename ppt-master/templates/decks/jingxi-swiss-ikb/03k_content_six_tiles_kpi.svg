<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FAFAF8"/>
  <g id="brand-chrome">
    <image href="images/logo.png" x="64" y="34" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>
    <text x="108" y="54" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="600" fill="#0A0A0A">{{COMPANY_NAME}}</text>
    <text x="108" y="72" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#737373">{{COMPANY_TAGLINE}}</text>
  </g>
  <text x="1216" y="100" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#737373" text-anchor="end">{{PAGE_NUM}}</text>
  <text x="64" y="132" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#525252">{{SECTION_LABEL}}</text>
  <rect x="64" y="152" width="80" height="3" fill="#002FA7"/>
  <text x="64" y="188" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="32" font-weight="200" fill="#0A0A0A">{{PAGE_TITLE}}</text>
  <!-- row1 tiles -->
  <rect x="64" y="208" width="368" height="128" rx="4" fill="#F0F0EE"/>
  <text x="88" y="240" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="600" fill="#002FA7">{{FEAT1_LABEL}}</text>
  <text x="88" y="272" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{FEAT1_DESC_L1}}</text>
  <text x="88" y="298" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{FEAT1_DESC_L2}}</text>
  <rect x="456" y="208" width="368" height="128" rx="4" fill="#F0F0EE"/>
  <text x="480" y="240" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="600" fill="#0A0A0A">{{FEAT2_LABEL}}</text>
  <text x="480" y="272" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{FEAT2_DESC_L1}}</text>
  <text x="480" y="298" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{FEAT2_DESC_L2}}</text>
  <rect x="848" y="208" width="368" height="128" rx="4" fill="#F0F0EE"/>
  <text x="872" y="240" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="600" fill="#0A0A0A">{{FEAT3_LABEL}}</text>
  <text x="872" y="272" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{FEAT3_DESC_L1}}</text>
  <text x="872" y="298" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{FEAT3_DESC_L2}}</text>
  <!-- row2 tiles -->
  <rect x="64" y="352" width="368" height="128" rx="4" fill="#F0F0EE"/>
  <text x="88" y="384" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="600" fill="#0A0A0A">{{FEAT4_LABEL}}</text>
  <text x="88" y="416" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{FEAT4_DESC_L1}}</text>
  <text x="88" y="442" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{FEAT4_DESC_L2}}</text>
  <rect x="456" y="352" width="368" height="128" rx="4" fill="#F0F0EE"/>
  <text x="480" y="384" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="600" fill="#0A0A0A">{{FEAT5_LABEL}}</text>
  <text x="480" y="416" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{FEAT5_DESC_L1}}</text>
  <text x="480" y="442" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{FEAT5_DESC_L2}}</text>
  <rect x="848" y="352" width="368" height="128" rx="4" fill="#002FA7"/>
  <text x="872" y="384" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">{{FEAT6_LABEL}}</text>
  <text x="872" y="416" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.92">{{FEAT6_DESC_L1}}</text>
  <text x="872" y="442" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.92">{{FEAT6_DESC_L2}}</text>
  <!-- kpi row -->
  <line x1="64" y1="504" x2="1216" y2="504" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="352" y1="504" x2="352" y2="664" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="640" y1="504" x2="640" y2="664" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="928" y1="504" x2="928" y2="664" stroke="#E0E0E0" stroke-width="1"/>
  <text x="64" y="536" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="0.12em" fill="#737373">{{KPI1_LBL}}</text>
  <text x="64" y="580" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="200" fill="#0A0A0A">{{KPI1_NB}}</text>
  <text x="64" y="612" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{KPI1_NOTE}}</text>
  <text x="368" y="536" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="0.12em" fill="#737373">{{KPI2_LBL}}</text>
  <text x="368" y="580" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="200" fill="#0A0A0A">{{KPI2_NB}}</text>
  <text x="368" y="612" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{KPI2_NOTE}}</text>
  <text x="656" y="536" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="0.12em" fill="#737373">{{KPI3_LBL}}</text>
  <text x="656" y="580" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="200" fill="#002FA7">{{KPI3_NB}}</text>
  <text x="656" y="612" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{KPI3_NOTE}}</text>
  <text x="944" y="536" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="0.12em" fill="#737373">{{KPI4_LBL}}</text>
  <text x="944" y="580" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="200" fill="#0A0A0A">{{KPI4_NB}}</text>
  <text x="944" y="612" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{KPI4_NOTE}}</text>
</svg>
