<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0A0A0A"/>
  <g id="brand-chrome">
    <image href="images/logo.png" x="64" y="32" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
    <text x="116" y="54" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="600" fill="#FAFAF8">{{COMPANY_NAME}}</text>
    <text x="116" y="72" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#94A3B8">{{COMPANY_TAGLINE}}</text>
  </g>
  <text x="1216" y="100" font-family="Arial, sans-serif" font-size="13" fill="#737373" text-anchor="end">{{PAGE_NUM}}</text>
  <text x="64" y="132" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#737373">{{SECTION_LABEL}}</text>
  <rect x="64" y="152" width="80" height="3" fill="#002FA7"/>
  <text x="64" y="188" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="32" font-weight="200" fill="#FAFAF8">{{PAGE_TITLE}}</text>
  <!-- column 1: PC -->
  <rect x="64" y="212" width="368" height="432" rx="4" fill="#F0F0EE"/>
  <text x="88" y="248" font-family="Arial, sans-serif" font-size="11" letter-spacing="0.12em" fill="#002FA7">{{LAYER1_NB}}</text>
  <g transform="translate(88,268)" stroke="#002FA7" stroke-width="1.6" fill="none">
    <rect x="4" y="2" width="36" height="26" rx="2"/>
    <path d="M14 32h16"/>
    <path d="M22 32v4"/>
  </g>
  <text x="88" y="332" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="400" fill="#0A0A0A">{{LAYER1_TITLE}}</text>
  <text x="88" y="372" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{LAYER1_DESC_L1}}</text>
  <text x="88" y="400" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#525252">{{LAYER1_DESC_L2}}</text>
  <line x1="88" y1="580" x2="408" y2="580" stroke="#E0E0E0" stroke-width="1"/>
  <text x="88" y="612" font-family="Arial, sans-serif" font-size="11" letter-spacing="0.1em" fill="#737373">{{LAYER1_TAG}}</text>
  <!-- column 2: IoT -->
  <rect x="456" y="212" width="368" height="432" rx="4" fill="#002FA7"/>
  <text x="480" y="248" font-family="Arial, sans-serif" font-size="11" letter-spacing="0.12em" fill="#FFFFFF" opacity="0.8">{{LAYER2_NB}}</text>
  <g transform="translate(480,268)" stroke="#FFFFFF" stroke-width="1.6" fill="none" opacity="0.95">
    <path d="M22 8c8 0 14 5 14 12 0 10-14 18-14 18S8 30 8 22c0-7 6-12 14-12z"/>
    <path d="M10 36h24"/>
  </g>
  <text x="480" y="332" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="400" fill="#FFFFFF">{{LAYER2_TITLE}}</text>
  <text x="480" y="372" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.9">{{LAYER2_DESC_L1}}</text>
  <text x="480" y="400" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.9">{{LAYER2_DESC_L2}}</text>
  <line x1="480" y1="580" x2="800" y2="580" stroke="#FFFFFF" stroke-width="1" opacity="0.35"/>
  <text x="480" y="612" font-family="Arial, sans-serif" font-size="11" letter-spacing="0.1em" fill="#FFFFFF" opacity="0.75">{{LAYER2_TAG}}</text>
  <!-- column 3: device -->
  <rect x="848" y="212" width="368" height="432" rx="4" fill="#1A1A1A" stroke="#525252" stroke-width="1"/>
  <text x="872" y="248" font-family="Arial, sans-serif" font-size="11" letter-spacing="0.12em" fill="#737373">{{LAYER3_NB}}</text>
  <g transform="translate(872,264)" stroke="#FAFAF8" stroke-width="1.6" fill="none" opacity="0.9">
    <rect x="10" y="2" width="24" height="40" rx="4"/>
    <circle cx="22" cy="36" r="2" fill="#FAFAF8" stroke="none"/>
  </g>
  <text x="872" y="332" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="400" fill="#FAFAF8">{{LAYER3_TITLE}}</text>
  <text x="872" y="372" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#94A3B8">{{LAYER3_DESC_L1}}</text>
  <text x="872" y="400" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#94A3B8">{{LAYER3_DESC_L2}}</text>
  <text x="872" y="428" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#94A3B8">{{LAYER3_DESC_L3}}</text>
  <line x1="872" y1="580" x2="1192" y2="580" stroke="#525252" stroke-width="1"/>
  <text x="872" y="612" font-family="Arial, sans-serif" font-size="11" letter-spacing="0.1em" fill="#737373">{{LAYER3_TAG}}</text>
  <text x="640" y="692" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#737373" text-anchor="middle" opacity="0.75">{{FOOTER_HINT}}</text>
</svg>
